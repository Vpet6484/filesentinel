<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}FileSentinel{% endblock %}</title>

    <!-- Main CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- NO CACHE -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>

<body>

{% if not session.get("user_id") or session.get("role") != "employee" %}
<script>
    window.location.href = "/";
</script>
{% endif %}

<!-- ================= HEADER ================= -->
<header>

    <!-- LEFT SIDE -->
    <div style="display:flex;align-items:center;gap:12px;">

        <h1 style="margin:0;">FileSentinel</h1>

        <span style="
            font-size:11px;
            padding:4px 8px;
            border-radius:6px;
            background:rgba(34,197,94,0.15);
            color:#22c55e;
            letter-spacing:1px;">
            EMPLOYEE
        </span>

    </div>

    <!-- RIGHT SIDE -->
    <nav style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">

        <a href="/employee/home">Home</a>

        <a href="/employee/files">My Files</a>

        <a href="/employee/upload">Upload File</a>

        <a href="/employee/requests">My Requests</a>

        <a href="/employee/feedback">Feedback</a>

        <a href="/logout"
           class="btn btn-danger"
           style="margin-left:8px;text-decoration:none;">
            Logout
        </a>

    </nav>

</header>

<!-- ================= MAIN ================= -->
<main>
    {% block content %}{% endblock %}
</main>



<!-- ================= SOCKET.IO ================= -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

    // Connect to admin namespace
    const socket = io("/admin");

    // Listen for force logout
    socket.on("force_logout", function(data){

        const myId = "{{ session['user_id'] }}";

        if (data.user_id == myId){

            alert("Your account has been disabled by admin.");

            window.location.href = "/logout";
        }

    });

</script>

</body>
</html>
